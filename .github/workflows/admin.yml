name: admin CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: fiveline/admin
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Install & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./admin

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./admin

      - name: Build
        run: npm run build
        working-directory: ./admin

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=mzc-pj4
            -Dsonar.projectKey=mzc-pj4_fiveline-admin
            -Dsonar.sources=admin/src
            -Dsonar.coverage.exclusions=**/*
            -Dsonar.cpd.exclusions=**/*

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./admin

      - name: Run npm audit
        run: npm audit --audit-level=critical
        working-directory: ./admin

  trigger-backend-deploy:
    name: Trigger Backend Deploy
    runs-on: ubuntu-latest
    needs: dependency-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Dispatch admin-service.yml in backend repo
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.MANIFEST_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/mzc-pj4/fiveline-backend/actions/workflows/admin-service.yml/dispatches \
            -d '{"ref":"main"}'

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: dependency-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: dev-${{ github.run_number }}-${{ github.sha }}
        run: |
          docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./admin
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.run_number }}-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  update-manifest:
    name: Update Manifest Repo
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: production

    steps:
      - name: Update image tag and create PR
        env:
          IMAGE_TAG: dev-${{ github.run_number }}-${{ github.sha }}
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/mzc-pj4/fiveline_k8s_manifest.git
          cd fiveline_k8s_manifest
          BRANCH=deploy/admin-${{ github.run_number }}
          git checkout -b $BRANCH
          sed -i "s|fiveline/admin:.*|fiveline/admin:${IMAGE_TAG}|" admin/admin.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add admin/admin.yaml
          git commit -m "chore: update admin image tag to ${IMAGE_TAG}"
          git push origin $BRANCH
          gh pr create \
            --repo mzc-pj4/fiveline_k8s_manifest \
            --title "chore: update admin image tag to ${IMAGE_TAG}" \
            --body "자동 생성된 PR입니다.\n\n서비스: admin (React)\n이미지 태그: ${IMAGE_TAG}\n실행자: ${{ github.actor }}" \
            --base main \
            --head $BRANCH

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: update-manifest
    if: false  # 알림 비활성화 (복구: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.update-manifest.result != 'skipped')

    steps:
      - name: Slack 알림
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.update-manifest.result == 'success' && '✅' || '❌' }} *admin 배포 ${{ needs.update-manifest.result == 'success' && '성공' || '실패' }}*\n브랜치: ${{ github.head_ref || github.ref_name }}\n실행자: ${{ github.actor }}\n커밋: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
