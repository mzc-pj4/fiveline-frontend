name: frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: fiveline/frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  test:
    name: Install & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: user/package-lock.json

      - name: Run tests
        run: echo "Tests temporarily disabled"

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: false
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=mzc-pj4
            -Dsonar.projectKey=mzc-pj4_fiveline-frontend
            -Dsonar.sources=user/src
            -Dsonar.coverage.exclusions=**/*
            -Dsonar.cpd.exclusions=**/*

  aiops-review:
    name: AIOps Code Review
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.event_name == 'pull_request'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: SonarCloud 결과 Bedrock으로 해석 후 PR 코멘트 등록
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install boto3 requests -q
          python3 << 'EOF'
          import boto3, json, requests, os

          sonar_token = os.environ['SONAR_TOKEN']
          project_key = 'mzc-pj4_fiveline-frontend'

          resp = requests.get(
              'https://sonarcloud.io/api/issues/search',
              params={
                  'componentKeys': project_key,
                  'resolved': 'false',
                  'ps': 20,
                  'types': 'BUG,VULNERABILITY,CODE_SMELL'
              },
              auth=(sonar_token, '')
          )
          issues = resp.json().get('issues', [])

          if not issues:
              issue_text = "SonarCloud에서 발견된 이슈가 없습니다. 코드 품질이 양호합니다."
          else:
              lines = []
              for i in issues[:10]:
                  component = i.get('component', '').split(':')[-1]
                  lines.append(f"- [{i.get('type')}] {i.get('message')} (심각도: {i.get('severity')}, 파일: {component})")
              issue_text = '\n'.join(lines)

          bedrock = boto3.client('bedrock-runtime', region_name='ap-northeast-2')

          prompt = f"""당신은 시니어 프론트엔드 개발자입니다. 아래 SonarCloud 코드 분석 결과를 보고 PR 코드 리뷰 코멘트를 작성해주세요.

          SonarCloud 이슈 목록:
          {issue_text}

          다음 형식으로 한국어로 간결하게 작성해주세요:
          1. 전체 요약 (1-2문장)
          2. 주요 이슈별 설명 및 개선 방안 (있는 경우)
          3. 우선순위 권고사항"""

          body = json.dumps({
              'anthropic_version': 'bedrock-2023-05-31',
              'max_tokens': 1024,
              'messages': [{'role': 'user', 'content': prompt}]
          })

          response = bedrock.invoke_model(
              modelId='anthropic.claude-3-haiku-20240307-v1:0',
              body=body
          )
          review = json.loads(response['body'].read())['content'][0]['text']

          gh_token = os.environ['GITHUB_TOKEN']
          pr_number = os.environ['PR_NUMBER']
          repo = os.environ['REPO']

          comment_body = f"""## 🤖 AIOps 코드 리뷰 (Amazon Bedrock)

          ### SonarCloud 분석 결과
          {issue_text}

          ### AI 리뷰 (Claude)
          {review}

          ---
          *이 리뷰는 SonarCloud + Amazon Bedrock (Claude 3 Haiku)에 의해 자동 생성되었습니다.*"""

          r = requests.post(
              f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
              headers={
                  'Authorization': f'Bearer {gh_token}',
                  'Accept': 'application/vnd.github.v3+json'
              },
              json={'body': comment_body}
          )
          print(f"PR 코멘트 등록: {r.status_code}")
          EOF

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: user/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./user

      - name: Run npm audit
        run: npm audit --audit-level=critical
        working-directory: ./user

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: dependency-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: dev-${{ github.run_number }}-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./user
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-risk-summary:
    name: Deployment Risk Summary (Bedrock)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: 변경사항 + SonarCloud 이슈 기반 배포 위험도 분석 (Bedrock)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          pip install boto3 requests -q
          python3 << 'EOF'
          import boto3, json, requests, os, subprocess

          sonar_token = os.environ['SONAR_TOKEN']
          project_key = 'mzc-pj4_fiveline-frontend'

          resp = requests.get(
              'https://sonarcloud.io/api/issues/search',
              params={
                  'componentKeys': project_key,
                  'resolved': 'false',
                  'ps': 20,
                  'types': 'BUG,VULNERABILITY,CODE_SMELL'
              },
              auth=(sonar_token, '')
          )
          issues = resp.json().get('issues', [])

          if not issues:
              issue_text = "SonarCloud에서 발견된 미해결 이슈가 없습니다."
          else:
              lines = []
              for i in issues[:10]:
                  component = i.get('component', '').split(':')[-1]
                  lines.append(f"- [{i.get('type')}] {i.get('message')} (심각도: {i.get('severity')}, 파일: {component})")
              issue_text = '\n'.join(lines)

          diff_stat = "(변경 파일 정보 없음)"
          for base in [os.environ.get('BEFORE_SHA', ''), 'HEAD~1']:
              if not base or base.startswith('0000000'):
                  continue
              result = subprocess.run(
                  ['git', 'diff', '--stat', base, 'HEAD', '--', 'user'],
                  capture_output=True, text=True
              )
              if result.returncode == 0 and result.stdout.strip():
                  diff_stat = result.stdout
                  break

          commit_message = os.environ.get('COMMIT_MESSAGE', '(커밋 메시지 없음)')

          bedrock = boto3.client('bedrock-runtime', region_name='ap-northeast-2')

          prompt = f"""당신은 시니어 프론트엔드 개발자입니다. 아래 정보를 바탕으로 이번 배포의 위험도를 평가해주세요.

          커밋 메시지:
          {commit_message}

          변경된 파일:
          {diff_stat}

          SonarCloud 미해결 이슈:
          {issue_text}

          다음 형식으로 한국어로 간결하게 답해주세요:
          위험도: (낮음/중간/높음) 중 하나
          이유: 1~2문장"""

          body = json.dumps({
              'anthropic_version': 'bedrock-2023-05-31',
              'max_tokens': 512,
              'messages': [{'role': 'user', 'content': prompt}]
          })

          response = bedrock.invoke_model(
              modelId='anthropic.claude-3-haiku-20240307-v1:0',
              body=body
          )
          analysis = json.loads(response['body'].read())['content'][0]['text']

          slack_webhook = os.environ['SLACK_WEBHOOK_URL']
          requests.post(slack_webhook, json={
              'text': f"🤖 *frontend 배포 위험도 분석 (Bedrock)*\n{analysis}"
          })
          print(analysis)
          EOF

  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:dev-${{ github.run_number }}-${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  update-manifest:
    name: Update Manifest Repo
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: production

    steps:
      - name: Update image tag and create PR
        env:
          IMAGE_TAG: dev-${{ github.run_number }}-${{ github.sha }}
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/mzc-pj4/fiveline_k8s_manifest.git
          cd fiveline_k8s_manifest
          BRANCH=deploy/frontend-${{ github.run_number }}
          git checkout -b $BRANCH
          sed -i "s|fiveline/frontend:.*|fiveline/frontend:${IMAGE_TAG}|" frontend/frontend.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add frontend/frontend.yaml
          git commit -m "chore: update frontend image tag to ${IMAGE_TAG}"
          git push origin $BRANCH
          gh pr create \
            --repo mzc-pj4/fiveline_k8s_manifest \
            --title "chore: update frontend image tag to ${IMAGE_TAG}" \
            --body "자동 생성된 PR입니다.\n\n서비스: frontend\n이미지 태그: ${IMAGE_TAG}\n실행자: ${{ github.actor }}" \
            --base main \
            --head $BRANCH
          gh pr merge --auto --squash \
            --repo mzc-pj4/fiveline_k8s_manifest \
            $BRANCH

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: update-manifest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.update-manifest.result != 'skipped'

    steps:
      - name: Slack 알림
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ needs.update-manifest.result == 'success' && '✅' || '❌' }} *frontend 배포 ${{ needs.update-manifest.result == 'success' && '성공' || '실패' }}*\n브랜치: ${{ github.head_ref || github.ref_name }}\n실행자: ${{ github.actor }}\n커밋: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 이메일 알림
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ needs.update-manifest.result == 'success' && '✅' || '❌' }} frontend 배포 ${{ needs.update-manifest.result == 'success' && '성공' || '실패' }}"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            브랜치: ${{ github.ref_name }}
            실행자: ${{ github.actor }}
            커밋: ${{ github.sha }}
            결과: ${{ needs.update-manifest.result }}
